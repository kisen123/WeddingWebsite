services:

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    develop:
      watch:
        - action: sync
          path: ./frontend/src
          target: /frontend_server/src
        - action: rebuild
          path: ./frontend/package.json
    depends_on:
      - backend

  backend:
    build:
      context: ./backend/api
      dockerfile: Dockerfile
    ports:
      - "5050:5050"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://0.0.0.0:5050
      ConnectionStrings__Default: "Host=db;Port=5432;Database=wedding;Username=wedding;Password=wedding"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: wedding
      POSTGRES_USER: wedding
      POSTGRES_PASSWORD: wedding
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wedding -d wedding"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data: